<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Jornada Matemática</title>
    
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        :root {
            --bg-escuro: #121214;
            --card-bg: #202024;
            --destaque: #00875f;
            --texto-claro: #e1e1e6;
            --texto-dica: #8d8d99;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-escuro);
            color: var(--texto-claro);
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
        }

        /* Cabeçalho Motivacional */
        header {
            text-align: center;
            padding: 40px 20px 30px;
            background: linear-gradient(180deg, #1a1a1e 0%, var(--bg-escuro) 100%);
            border-bottom: 1px solid #323238;
        }

        header h1 {
            margin: 0;
            font-size: 1.8rem;
            color: #fff;
        }

        .motivacional {
            font-size: 0.95rem;
            color: var(--texto-dica);
            margin-top: 10px;
            font-style: italic;
        }

        /* Container que segura os blocos */
        .container {
            padding: 20px;
            padding-bottom: 50px;
        }

        .bloco-titulo {
            font-size: 1.3rem;
            color: var(--texto-claro);
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--destaque);
            display: inline-block;
        }

        .secao-bloco {
            margin-bottom: 40px;
        }

        /* Cards Mobile-First */
        .card-tema {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 25px 20px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .icone {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        .card-titulo {
            font-size: 1.2rem;
            margin: 0 0 20px 0;
            font-weight: bold;
        }

        .btn-iniciar {
            background-color: var(--destaque);
            color: white;
            text-decoration: none;
            padding: 15px;
            width: 85%;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }

        .btn-iniciar:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <header>
        <h1>Minha Jornada Matemática</h1>
        <p class="motivacional">"O único lugar onde o sucesso vem antes do trabalho é no dicionário."</p>
    </header>

    <div class="container">

        <div class="secao-bloco">
            <h2 class="bloco-titulo">Bloco 02: Álgebra</h2>
            
            <div class="card-tema">
                <div class="icone">🧮</div>
                <h3 class="card-titulo">Expressões Algébricas</h3>
                <a href="02-algebra/01-expressoes/01-teoria.html" class="btn-iniciar">COMEÇAR</a>
                
            </div>

            </div>


        </div>

    <script src="js/brain.js"></script>
</body>
</html>
